# Snippet para el server{} de Nginx que ya expone tu backend NestJS por HTTPS.
# El túnel Guacamole necesita upgrade a WebSocket y timeouts largos (sesión viva).
# Pega este location junto a tu proxy_pass del API (mismo upstream/backend).

# IMPORTANTE: el frontend abre el WS contra /api/ws/guacamole (misma baseURL del API),
# por eso el location DEBE incluir el prefijo /api. Debe ir ANTES de tu `location /api`
# genérico para que gane la especificidad. El backend acepta ambas variantes, pero nginx
# solo agrega las cabeceras de Upgrade en el location que hace match.
location /api/ws/guacamole {
    proxy_pass http://127.0.0.1:PUERTO_BACKEND;   # el puerto de tu NestJS
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_read_timeout 86400s;   # sesión remota de larga duración
    proxy_send_timeout 86400s;
    proxy_buffering off;         # baja latencia (streaming interactivo)
}
